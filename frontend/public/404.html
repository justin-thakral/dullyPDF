<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Page Not Found (404) | DullyPDF</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #f4f7fb 0%, #e8eef7 100%);
        color: #102a43;
        font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
      }
      .card {
        width: min(680px, 92vw);
        background: #fff;
        border: 1px solid #d8e0ec;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 14px 28px rgba(16, 24, 40, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.7rem;
        line-height: 1.2;
      }
      p {
        margin: 0 0 14px;
        line-height: 1.55;
      }
      a {
        color: #1d4ed8;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      .code {
        display: inline-block;
        margin: 0 0 10px;
        padding: 4px 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #1d4ed8;
        font-weight: 700;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="code">404</p>
      <h1>Page not found</h1>
      <p>The page you requested does not exist.</p>
      <p>
        Go to <a href="/usage-docs">Usage Docs</a> or return to the <a href="/">homepage</a>.
      </p>
    </main>
  </body>
</html>

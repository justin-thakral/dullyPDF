name: Controlled Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      component:
        description: Deploy scope
        required: true
        default: frontend
        type: choice
        options:
          - frontend
          - backend
          - detectors
          - workers
          - all
      backend_image:
        description: Optional backend image override for backend/all deploys
        required: false
        type: string
      dry_run:
        description: Validate the deploy plan without authenticating or deploying
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'deploy-dev-frontend-*'
      - 'deploy-dev-backend-*'
      - 'deploy-dev-detectors-*'
      - 'deploy-dev-workers-*'
      - 'deploy-dev-all-*'
      - 'deploy-prod-frontend-*'
      - 'deploy-prod-backend-*'
      - 'deploy-prod-detectors-*'
      - 'deploy-prod-workers-*'
      - 'deploy-prod-all-*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: controlled-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.resolve.outputs.deploy_environment }}
      component: ${{ steps.resolve.outputs.component }}
      backend_image: ${{ steps.resolve.outputs.backend_image }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      github_environment: ${{ steps.resolve.outputs.github_environment }}
    steps:
      - name: Resolve deploy request
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment || '' }}
          INPUT_COMPONENT: ${{ github.event.inputs.component || '' }}
          INPUT_BACKEND_IMAGE: ${{ github.event.inputs.backend_image || '' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          deploy_environment=""
          component=""
          backend_image=""
          dry_run="false"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            deploy_environment="$INPUT_ENVIRONMENT"
            component="$INPUT_COMPONENT"
            backend_image="$INPUT_BACKEND_IMAGE"
            dry_run="${INPUT_DRY_RUN,,}"
          else
            if [[ ! "$REF_NAME" =~ ^deploy-(dev|prod)-(frontend|backend|detectors|workers|all)-((dryrun)-)?(.+)$ ]]; then
              echo "Unsupported deploy tag: ${REF_NAME}" >&2
              exit 1
            fi
            deploy_environment="${BASH_REMATCH[1]}"
            component="${BASH_REMATCH[2]}"
            if [[ -n "${BASH_REMATCH[4]}" ]]; then
              dry_run="true"
            fi
          fi

          case "$deploy_environment" in
            dev|prod) ;;
            *)
              echo "Unsupported deploy environment: ${deploy_environment}" >&2
              exit 1
              ;;
          esac

          case "$component" in
            frontend|backend|detectors|workers|all) ;;
            *)
              echo "Unsupported deploy component: ${component}" >&2
              exit 1
              ;;
          esac

          if [[ -n "$backend_image" && "$component" != "backend" && "$component" != "all" ]]; then
            echo "backend_image is only supported for component=backend|all." >&2
            exit 1
          fi

          github_environment="development"
          if [[ "$deploy_environment" == "prod" ]]; then
            github_environment="production"
          fi

          {
            echo "deploy_environment=${deploy_environment}"
            echo "component=${component}"
            echo "backend_image=${backend_image}"
            echo "dry_run=${dry_run}"
            echo "github_environment=${github_environment}"
          } >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: resolve
    environment: ${{ needs.resolve.outputs.github_environment }}
    timeout-minutes: 60
    env:
      DEPLOY_ENVIRONMENT: ${{ needs.resolve.outputs.deploy_environment }}
      DEPLOY_COMPONENT: ${{ needs.resolve.outputs.component }}
      BACKEND_IMAGE: ${{ needs.resolve.outputs.backend_image }}
      DRY_RUN: ${{ needs.resolve.outputs.dry_run }}
      DEPLOY_WIF_PROVIDER: ${{ needs.resolve.outputs.deploy_environment == 'prod' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_PROD || secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_DEV }}
      DEPLOY_SERVICE_ACCOUNT: ${{ needs.resolve.outputs.deploy_environment == 'prod' && secrets.GCP_SERVICE_ACCOUNT_PROD || secrets.GCP_SERVICE_ACCOUNT_DEV }}
      DEPLOY_CREDENTIALS_JSON: ${{ needs.resolve.outputs.deploy_environment == 'prod' && secrets.GCP_CREDENTIALS_JSON_PROD || secrets.GCP_CREDENTIALS_JSON_DEV }}
      DEPLOY_BACKEND_ENV_B64: ${{ needs.resolve.outputs.deploy_environment == 'prod' && secrets.BACKEND_ENV_FILE_B64_PROD || secrets.BACKEND_ENV_FILE_B64_DEV }}
      DEPLOY_FRONTEND_OVERRIDE_B64: ${{ needs.resolve.outputs.deploy_environment == 'prod' && secrets.FRONTEND_ENV_OVERRIDE_B64_PROD || secrets.FRONTEND_ENV_OVERRIDE_B64_DEV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install root dependencies
        run: |
          set -euo pipefail
          if [[ "$DEPLOY_COMPONENT" != "frontend" && "$DEPLOY_COMPONENT" != "all" ]]; then
            echo "Root frontend dependencies are not needed for component=${DEPLOY_COMPONENT}."
            exit 0
          fi
          npm ci

      - name: Install frontend dependencies
        run: |
          set -euo pipefail
          if [[ "$DEPLOY_COMPONENT" != "frontend" && "$DEPLOY_COMPONENT" != "all" ]]; then
            echo "Frontend package install is not needed for component=${DEPLOY_COMPONENT}."
            exit 0
          fi
          npm --prefix frontend ci

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          if [[ "$DEPLOY_COMPONENT" != "backend" && "$DEPLOY_COMPONENT" != "all" ]]; then
            echo "Backend Python dependencies are not needed for component=${DEPLOY_COMPONENT}."
            exit 0
          fi
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.DEPLOY_WIF_PROVIDER != '' && env.DEPLOY_SERVICE_ACCOUNT != '' && env.DEPLOY_WIF_PROVIDER || '' }}
          service_account: ${{ env.DEPLOY_WIF_PROVIDER != '' && env.DEPLOY_SERVICE_ACCOUNT != '' && env.DEPLOY_SERVICE_ACCOUNT || '' }}
          credentials_json: ${{ ((env.DEPLOY_WIF_PROVIDER == '' || env.DEPLOY_SERVICE_ACCOUNT == '') && env.DEPLOY_CREDENTIALS_JSON) || '' }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify deploy auth exists
        run: |
          set -euo pipefail
          active_account="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -n 1)"
          if [[ -z "$active_account" ]]; then
            echo "Missing Google Cloud auth. Configure WIF or service-account key secrets for this environment." >&2
            exit 1
          fi
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run validated deploy auth as ${active_account}."
          else
            echo "Authenticated as ${active_account}"
          fi

      - name: Seed ADC for runner-side backend preflight checks
        run: |
          set -euo pipefail
          if [[ "$DEPLOY_COMPONENT" != "backend" && "$DEPLOY_COMPONENT" != "all" ]]; then
            echo "Runner ADC is not required for component=${DEPLOY_COMPONENT}."
            exit 0
          fi

          creds_source=""
          for candidate in \
            "${GOOGLE_GHA_CREDS_PATH:-}" \
            "${GOOGLE_APPLICATION_CREDENTIALS:-}" \
            "${CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE:-}"
          do
            if [[ -n "$candidate" && -f "$candidate" ]]; then
              creds_source="$candidate"
              break
            fi
          done

          if [[ -z "$creds_source" ]]; then
            echo "Missing credential file for runner ADC bootstrap." >&2
            exit 1
          fi

          adc_dir="${HOME}/.config/gcloud"
          adc_path="${adc_dir}/application_default_credentials.json"
          mkdir -p "$adc_dir"
          cp "$creds_source" "$adc_path"
          chmod 600 "$adc_path"

          # The deploy scripts intentionally scrub credential-file env vars before
          # invoking the guarded prod entrypoints. Seeding the well-known ADC path
          # keeps runner-side Python preflight checks authenticated without relaxing
          # the runtime env validation.
          gcloud auth application-default print-access-token >/dev/null

      - name: Install Firebase CLI
        run: |
          set -euo pipefail
          if [[ "$DEPLOY_COMPONENT" != "frontend" && "$DEPLOY_COMPONENT" != "all" && "$DEPLOY_COMPONENT" != "backend" && "$DEPLOY_COMPONENT" != "detectors" && "$DEPLOY_COMPONENT" != "workers" ]]; then
            echo "Unexpected deploy component: ${DEPLOY_COMPONENT}" >&2
            exit 1
          fi
          if [[ "$DEPLOY_COMPONENT" != "frontend" && "$DEPLOY_COMPONENT" != "all" ]]; then
            echo "Firebase CLI is not required for component=${DEPLOY_COMPONENT}."
            exit 0
          fi
          npm install --global firebase-tools

      - name: Materialize backend env file
        run: |
          set -euo pipefail
          rm -f "$RUNNER_TEMP/backend.env"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run does not materialize backend env files."
            exit 0
          fi
          if [[ "$DEPLOY_COMPONENT" == "frontend" ]]; then
            echo "Backend env file is not required for component=${DEPLOY_COMPONENT}."
            exit 0
          fi
          if [[ -z "$DEPLOY_BACKEND_ENV_B64" ]]; then
            echo "Missing backend env secret for environment=${DEPLOY_ENVIRONMENT}." >&2
            exit 1
          fi
          printf '%s' "$DEPLOY_BACKEND_ENV_B64" | base64 --decode > "$RUNNER_TEMP/backend.env"

      - name: Materialize frontend override env file
        run: |
          set -euo pipefail
          rm -f "$RUNNER_TEMP/frontend.env"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run does not materialize frontend override env files."
            exit 0
          fi
          if [[ "$DEPLOY_COMPONENT" != "frontend" && "$DEPLOY_COMPONENT" != "all" ]]; then
            echo "Frontend override env file is not required for component=${DEPLOY_COMPONENT}."
            exit 0
          fi
          if [[ -z "$DEPLOY_FRONTEND_OVERRIDE_B64" ]]; then
            if [[ "$DEPLOY_ENVIRONMENT" == "prod" ]]; then
              echo "Missing prod frontend override env secret." >&2
              exit 1
            fi
            echo "No dev frontend override env file configured; using committed stack defaults."
            exit 0
          fi
          printf '%s' "$DEPLOY_FRONTEND_OVERRIDE_B64" | base64 --decode > "$RUNNER_TEMP/frontend.env"

      - name: Run deploy target
        run: |
          set -euo pipefail

          restore_var() {
            local name="$1"
            local value="$2"
            if [[ -n "$value" ]]; then
              export "${name}=${value}"
            else
              unset "${name}"
            fi
          }

          args=(
            --environment "$DEPLOY_ENVIRONMENT"
            --component "$DEPLOY_COMPONENT"
          )
          if [[ -f "$RUNNER_TEMP/backend.env" ]]; then
            args+=(--backend-env-file "$RUNNER_TEMP/backend.env")
          fi
          if [[ -f "$RUNNER_TEMP/frontend.env" ]]; then
            args+=(--frontend-env-file "$RUNNER_TEMP/frontend.env")
          fi
          if [[ -n "$BACKEND_IMAGE" ]]; then
            args+=(--backend-image "$BACKEND_IMAGE")
          fi
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi

          saved_google_application_credentials="${GOOGLE_APPLICATION_CREDENTIALS-}"
          saved_cloudsdk_auth_credential_file_override="${CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE-}"
          saved_google_gha_creds_path="${GOOGLE_GHA_CREDS_PATH-}"

          if [[ "$DEPLOY_COMPONENT" == "frontend" ]]; then
            bash scripts/ci/deploy_target.sh "${args[@]}"
            exit 0
          fi

          # Prod backend-style deploy scripts reject credential-file env injection
          # and expect the authenticated gcloud session to stand on its own. Keep
          # those guards for backend, detectors, workers, and all-in-one deploys,
          # but allow frontend-only deploys to use the credential file that
          # Firebase Hosting expects in GitHub Actions.
          unset GOOGLE_APPLICATION_CREDENTIALS CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE GOOGLE_GHA_CREDS_PATH
          bash scripts/ci/deploy_target.sh "${args[@]}"
          restore_var GOOGLE_APPLICATION_CREDENTIALS "${saved_google_application_credentials}"
          restore_var CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE "${saved_cloudsdk_auth_credential_file_override}"
          restore_var GOOGLE_GHA_CREDS_PATH "${saved_google_gha_creds_path}"

      - name: Install Chromium for Playwright deploy smoke
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" || "$DEPLOY_COMPONENT" != "frontend" && "$DEPLOY_COMPONENT" != "all" ]]; then
            echo "Hosted Playwright smoke is not required for component=${DEPLOY_COMPONENT}."
            exit 0
          fi
          npx playwright install --with-deps chromium

      - name: Run deployed frontend Playwright smoke
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" || "$DEPLOY_COMPONENT" != "frontend" && "$DEPLOY_COMPONENT" != "all" ]]; then
            echo "Hosted Playwright smoke is not required for component=${DEPLOY_COMPONENT}."
            exit 0
          fi
          if [[ "$DEPLOY_ENVIRONMENT" == "prod" ]]; then
            base_url="https://dullypdf.web.app"
          else
            base_url="https://dullypdf-dev.web.app"
          fi

          check_api_health="false"
          if [[ "$DEPLOY_COMPONENT" == "all" ]]; then
            check_api_health="true"
          fi

          PLAYWRIGHT_BASE_URL="$base_url" \
          PLAYWRIGHT_API_URL="$base_url" \
          PLAYWRIGHT_CHECK_API_HEALTH="$check_api_health" \
          npm run test:playwright:deployed-frontend:real

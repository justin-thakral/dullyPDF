name: Hybrid QA

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  id-token: write

concurrency:
  group: hybrid-qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_any: ${{ steps.filter.outputs.frontend_any }}
      frontend_any_files: ${{ steps.filter.outputs.frontend_any_files }}
      backend_any: ${{ steps.filter.outputs.backend_any }}
      backend_any_files: ${{ steps.filter.outputs.backend_any_files }}
      template_api: ${{ steps.filter.outputs.template_api }}
      detection_ai: ${{ steps.filter.outputs.detection_ai }}
      workspace: ${{ steps.filter.outputs.workspace }}
      fill_links: ${{ steps.filter.outputs.fill_links }}
      signing: ${{ steps.filter.outputs.signing }}
      billing: ${{ steps.filter.outputs.billing }}
      shared_runtime: ${{ steps.filter.outputs.shared_runtime }}
      playwright_safe: ${{ steps.filter.outputs.playwright_safe }}
      frontend_content: ${{ steps.filter.outputs.frontend_content }}
      frontend_content_files: ${{ steps.filter.outputs.frontend_content_files }}
      backend_governance: ${{ steps.filter.outputs.backend_governance }}
      ci_meta: ${{ steps.filter.outputs.ci_meta }}
      frontend_lint: ${{ steps.filter.outputs.frontend_lint }}
      frontend_lint_files: ${{ steps.filter.outputs.frontend_lint_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          list-files: shell
          filters: |
            frontend_any:
              - 'frontend/**'
              - 'scripts/use-frontend-env.sh'
              - 'scripts/convert-webp-assets.sh'
              - 'scripts/generate-static-html.mjs'
              - 'scripts/generate-sitemap.mjs'
              - 'package.json'
              - 'package-lock.json'
            backend_any:
              - 'backend/**'
              - 'package.json'
            template_api:
              - 'backend/api/routes/template_api*.py'
              - 'backend/firebaseDB/template_api_endpoint_database.py'
              - 'backend/services/template_api_service.py'
              - 'backend/test/integration/test_template_api_integration.py'
              - 'frontend/**/template_api*'
            detection_ai:
              - 'backend/api/routes/ai.py'
              - 'backend/api/routes/detection.py'
              - 'backend/detection/**'
              - 'backend/fieldDetecting/**'
              - 'backend/services/detection_service.py'
              - 'backend/services/task_auth_service.py'
              - 'backend/test/integration/test_detection_rename_saved_form_flow.py'
              - 'frontend/**/rename*'
              - 'frontend/**/schema*'
              - 'frontend/**/pipeline*'
            workspace:
              - 'backend/api/routes/groups.py'
              - 'backend/api/routes/profile.py'
              - 'backend/api/routes/saved_forms.py'
              - 'backend/api/routes/sessions.py'
              - 'backend/firebaseDB/group_database.py'
              - 'backend/firebaseDB/template_database.py'
              - 'backend/services/saved_form*'
              - 'backend/test/integration/test_workspace_bootstrap_integration.py'
              - 'frontend/**/workspace*'
              - 'frontend/**/saved*'
              - 'frontend/**/group*'
            fill_links:
              - 'backend/**/fill_link*'
              - 'backend/test/integration/test_fill_links_integration.py'
              - 'frontend/**/fill_link*'
            signing:
              - 'backend/**/signing*'
              - 'backend/test/integration/test_signing_foundation_integration.py'
              - 'frontend/**/signing*'
            billing:
              - 'backend/**/billing*'
              - 'backend/test/integration/test_billing_*'
              - 'frontend/**/billing*'
              - 'frontend/**/downgrade*'
            shared_runtime:
              - 'backend/api/middleware/**'
              - 'backend/firebaseDB/firebase_service.py'
              - 'backend/sessions/**'
              - 'backend/services/app_config.py'
              - 'frontend/src/App.tsx'
              - 'frontend/src/services/api.ts'
              - 'frontend/src/services/apiConfig.ts'
              - 'package.json'
              - 'frontend/package.json'
            playwright_safe:
              - 'frontend/test/playwright/**'
              - 'frontend/src/testSupport/**'
            frontend_content:
              - 'frontend/src/components/pages/BlogIndexPage.*'
              - 'frontend/src/components/pages/BlogPostPage.*'
              - 'frontend/src/components/pages/Homepage.*'
              - 'frontend/src/components/pages/IntentHubPage.*'
              - 'frontend/src/components/pages/IntentLandingPage.*'
              - 'frontend/src/components/pages/IntentPageShell.*'
              - 'frontend/src/components/pages/LegalPage.*'
              - 'frontend/src/components/pages/PublicNotFoundPage.*'
              - 'frontend/src/components/pages/UsageDocsPage.*'
              - 'frontend/src/components/pages/UsageDocsNotFoundPage.*'
              - 'frontend/src/components/pages/usageDocsContent.*'
              - 'frontend/src/config/blogPosts.ts'
              - 'frontend/src/config/blogSeo.ts'
              - 'frontend/src/config/featurePlanPages.ts'
              - 'frontend/src/config/intentPages.ts'
              - 'frontend/src/config/routeSeo.ts'
              - 'scripts/generate-static-html.mjs'
              - 'scripts/seo-route-data.mjs'
            backend_governance:
              - 'backend/scripts/**'
              - 'collaborators/**'
              - 'scripts/_detector_routing.sh'
              - 'scripts/benchmark-detector-cpu-gpu.sh'
              - 'scripts/deploy-all-services.sh'
              - 'scripts/deploy-backend.sh'
              - 'scripts/deploy-detector-services.sh'
              - 'scripts/deploy-firestore-indexes.sh'
              - 'scripts/deploy-frontend.sh'
              - 'scripts/deploy-openai-workers.sh'
              - 'scripts/deploy-session-cleanup-job.sh'
              - 'scripts/deploy-session-cleanup-scheduler.sh'
              - 'scripts/grant-dev-gcp-access.sh'
              - 'scripts/lock-signing-storage-retention.sh'
              - 'scripts/prune-stale-cloud-resources.sh'
              - 'scripts/run-dev.sh'
              - 'scripts/sync-detector-task-queues.sh'
              - 'scripts/validate-signing-storage.py'
              - '.dockerignore'
              - 'Dockerfile'
              - 'config/backend.prod.env.example'
              - 'firebase.json'
              - 'firestore.indexes.json'
            ci_meta:
              - '.github/workflows/**'
              - 'scripts/ci/**'
            frontend_lint:
              - 'frontend/src/**/*.js'
              - 'frontend/src/**/*.jsx'
              - 'frontend/src/**/*.ts'
              - 'frontend/src/**/*.tsx'
              - 'frontend/src/**/*.mjs'
              - 'frontend/src/**/*.cjs'

  ci_meta:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - changes
    if: ${{ needs.changes.outputs.ci_meta == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.12

      - name: Validate CI helper shell scripts
        run: bash -n scripts/ci/*.sh

      - name: Validate CI helper Python syntax
        run: python3 -m py_compile scripts/ci/render_env_yaml.py

  frontend_qa:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - changes
    if: ${{ needs.changes.outputs.frontend_any == 'true' || needs.changes.outputs.frontend_content == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Classify frontend changes
        id: classify
        env:
          CHANGED_FRONTEND_FILES: ${{ needs.changes.outputs.frontend_any_files }} ${{ needs.changes.outputs.frontend_content_files }}
        run: bash scripts/ci/classify_frontend_changes.sh

      - name: Lint changed frontend files
        env:
          CHANGED_FRONTEND_LINT_FILES: ${{ needs.changes.outputs.frontend_lint_files }}
        run: bash scripts/ci/run_frontend_changed_lint.sh

      - name: Run frontend unit tests
        if: ${{ steps.classify.outputs.run_runtime_tests == 'true' }}
        run: npm run test:frontend:ci

      - name: Run frontend content and SEO tests
        if: ${{ steps.classify.outputs.run_content_tests == 'true' }}
        run: npm run test:frontend:content

      - name: Run frontend prod build
        if: ${{ steps.classify.outputs.run_build == 'true' }}
        run: |
          set -euo pipefail
          cd frontend
          npm run build:prod

  backend_qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - changes
    if: ${{ needs.changes.outputs.backend_any == 'true' || needs.changes.outputs.backend_governance == 'true' || needs.changes.outputs.shared_runtime == 'true' }}
    env:
      RUN_TEMPLATE_API: ${{ needs.changes.outputs.template_api }}
      RUN_DETECTION_AI: ${{ needs.changes.outputs.detection_ai }}
      RUN_WORKSPACE: ${{ needs.changes.outputs.workspace }}
      RUN_FILL_LINKS: ${{ needs.changes.outputs.fill_links }}
      RUN_SIGNING: ${{ needs.changes.outputs.signing }}
      RUN_BILLING: ${{ needs.changes.outputs.billing }}
      RUN_SHARED_RUNTIME: ${{ needs.changes.outputs.shared_runtime }}
      DEV_WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_DEV }}
      DEV_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}
      DEV_KEY_JSON: ${{ secrets.GCP_CREDENTIALS_JSON_DEV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Classify backend changes
        id: classify
        env:
          CHANGED_BACKEND_FILES: ${{ needs.changes.outputs.backend_any_files }}
        run: bash scripts/ci/classify_backend_changes.sh

      - name: Authenticate to Google Cloud for backend integration suites
        if: >-
          ${{
            needs.changes.outputs.template_api == 'true'
            || needs.changes.outputs.detection_ai == 'true'
            || needs.changes.outputs.workspace == 'true'
            || needs.changes.outputs.fill_links == 'true'
            || needs.changes.outputs.signing == 'true'
            || needs.changes.outputs.billing == 'true'
            || needs.changes.outputs.shared_runtime == 'true'
          }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.DEV_WIF_PROVIDER != '' && env.DEV_SERVICE_ACCOUNT != '' && env.DEV_WIF_PROVIDER || '' }}
          service_account: ${{ env.DEV_WIF_PROVIDER != '' && env.DEV_SERVICE_ACCOUNT != '' && env.DEV_SERVICE_ACCOUNT || '' }}
          credentials_json: ${{ ((env.DEV_WIF_PROVIDER == '' || env.DEV_SERVICE_ACCOUNT == '') && env.DEV_KEY_JSON) || '' }}

      - name: Run backend unit tests
        if: ${{ steps.classify.outputs.run_runtime_units == 'true' }}
        run: npm run test:backend:ci

      - name: Run backend governance unit tests
        if: ${{ steps.classify.outputs.run_governance_units == 'true' || needs.changes.outputs.backend_governance == 'true' }}
        run: npm run test:backend:governance

      - name: Run targeted backend integration suites
        if: >-
          ${{
            needs.changes.outputs.template_api == 'true'
            || needs.changes.outputs.detection_ai == 'true'
            || needs.changes.outputs.workspace == 'true'
            || needs.changes.outputs.fill_links == 'true'
            || needs.changes.outputs.signing == 'true'
            || needs.changes.outputs.billing == 'true'
            || needs.changes.outputs.shared_runtime == 'true'
          }}
        run: bash scripts/ci/run_targeted_backend_suites.sh

  playwright_qa:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: development
    needs:
      - changes
      - frontend_qa
      - backend_qa
    if: >-
      ${{
        always()
        && (
          needs.changes.outputs.playwright_safe == 'true'
          || needs.changes.outputs.template_api == 'true'
          || needs.changes.outputs.detection_ai == 'true'
          || needs.changes.outputs.workspace == 'true'
          || needs.changes.outputs.fill_links == 'true'
          || needs.changes.outputs.signing == 'true'
          || needs.changes.outputs.shared_runtime == 'true'
        )
        && (needs.frontend_qa.result == 'success' || needs.frontend_qa.result == 'skipped')
        && (needs.backend_qa.result == 'success' || needs.backend_qa.result == 'skipped')
      }}
    env:
      DEV_WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_DEV }}
      DEV_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}
      DEV_KEY_JSON: ${{ secrets.GCP_CREDENTIALS_JSON_DEV }}
      BACKEND_ENV_FILE_B64_DEV: ${{ secrets.BACKEND_ENV_FILE_B64_DEV }}
      FIREBASE_SERVICE_ACCOUNT_ID: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}
      SMOKE_LOGIN_EMAIL: ${{ secrets.SMOKE_LOGIN_EMAIL }}
      SMOKE_LOGIN_PASSWORD: ${{ secrets.SMOKE_LOGIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Authenticate to Google Cloud for hybrid QA
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.DEV_WIF_PROVIDER != '' && env.DEV_SERVICE_ACCOUNT != '' && env.DEV_WIF_PROVIDER || '' }}
          service_account: ${{ env.DEV_WIF_PROVIDER != '' && env.DEV_SERVICE_ACCOUNT != '' && env.DEV_SERVICE_ACCOUNT || '' }}
          credentials_json: ${{ ((env.DEV_WIF_PROVIDER == '' || env.DEV_SERVICE_ACCOUNT == '') && env.DEV_KEY_JSON) || '' }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Run hybrid QA pipeline
        env:
          RUN_PLAYWRIGHT_SAFE: ${{ needs.changes.outputs.playwright_safe }}
          RUN_TEMPLATE_API: ${{ needs.changes.outputs.template_api }}
          RUN_DETECTION_AI: ${{ needs.changes.outputs.detection_ai }}
          RUN_WORKSPACE: ${{ needs.changes.outputs.workspace }}
          RUN_FILL_LINKS: ${{ needs.changes.outputs.fill_links }}
          RUN_SIGNING: ${{ needs.changes.outputs.signing }}
          RUN_SHARED_RUNTIME: ${{ needs.changes.outputs.shared_runtime }}
        run: |
          set -euo pipefail

          restore_var() {
            local name="$1"
            local value="$2"
            if [[ -n "$value" ]]; then
              export "${name}=${value}"
            else
              unset "${name}"
            fi
          }

          wait_for_http() {
            local url="$1"
            local log_path="$2"
            local service_name="$3"
            local attempts=0
            until curl --silent --fail "$url" >/dev/null; do
              attempts=$((attempts + 1))
              if (( attempts >= 60 )); then
                echo "${service_name} did not become ready in time." >&2
                cat "$log_path" >&2 || true
                return 1
              fi
              sleep 2
            done
          }

          saved_cloudsdk_core_project="${CLOUDSDK_CORE_PROJECT-}"
          saved_cloudsdk_project="${CLOUDSDK_PROJECT-}"
          saved_gcloud_project="${GCLOUD_PROJECT-}"
          saved_gcp_project="${GCP_PROJECT-}"
          saved_google_cloud_project="${GOOGLE_CLOUD_PROJECT-}"
          saved_google_application_credentials="${GOOGLE_APPLICATION_CREDENTIALS-}"
          saved_cloudsdk_auth_credential_file_override="${CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE-}"
          saved_google_gha_creds_path="${GOOGLE_GHA_CREDS_PATH-}"
          saved_firebase_service_account_id="${FIREBASE_SERVICE_ACCOUNT_ID-}"

          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          unset GOOGLE_APPLICATION_CREDENTIALS CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE GOOGLE_GHA_CREDS_PATH
          unset FIREBASE_SERVICE_ACCOUNT_ID

          restore_var CLOUDSDK_CORE_PROJECT "${saved_cloudsdk_core_project}"
          restore_var CLOUDSDK_PROJECT "${saved_cloudsdk_project}"
          restore_var GCLOUD_PROJECT "${saved_gcloud_project}"
          restore_var GCP_PROJECT "${saved_gcp_project}"
          restore_var GOOGLE_CLOUD_PROJECT "${saved_google_cloud_project}"
          restore_var GOOGLE_APPLICATION_CREDENTIALS "${saved_google_application_credentials}"
          restore_var CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE "${saved_cloudsdk_auth_credential_file_override}"
          restore_var GOOGLE_GHA_CREDS_PATH "${saved_google_gha_creds_path}"
          restore_var FIREBASE_SERVICE_ACCOUNT_ID "${saved_firebase_service_account_id}"

          if [[ -z "${SMOKE_LOGIN_EMAIL:-}" || -z "${SMOKE_LOGIN_PASSWORD:-}" ]]; then
            echo "Missing SMOKE_LOGIN_EMAIL or SMOKE_LOGIN_PASSWORD secret in the development environment." >&2
            exit 1
          fi

          active_account="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -n 1)"
          if [[ -z "$active_account" ]]; then
            echo "Missing Google Cloud auth for seeded real Playwright fixtures. Configure dev WIF or service-account key secrets." >&2
            exit 1
          fi
          echo "Authenticated as ${active_account}"

          if [[ -z "${BACKEND_ENV_FILE_B64_DEV}" ]]; then
            echo "Missing BACKEND_ENV_FILE_B64_DEV secret in the development environment." >&2
            exit 1
          fi
          mkdir -p env
          printf '%s' "${BACKEND_ENV_FILE_B64_DEV}" | base64 --decode > env/backend.dev.env
          cat <<'EOF' >> env/backend.dev.env
          FIREBASE_CREDENTIALS_SECRET=
          FIREBASE_CREDENTIALS_PROJECT=
          GMAIL_CLIENT_SECRET_SECRET=
          GMAIL_REFRESH_TOKEN_SECRET=
          GMAIL_SECRETS_PROJECT=
          FILL_LINK_REQUIRE_RECAPTCHA=false
          OPENAI_RENAME_REMAP_MODE=local
          EOF

          npx playwright install --with-deps chromium

          nohup npm run backend:dev > /tmp/dullypdf-backend.log 2>&1 &
          wait_for_http http://127.0.0.1:8000/api/health /tmp/dullypdf-backend.log "Backend dev server"

          bash scripts/use-frontend-env.sh dev
          printf '\nVITE_FILL_LINK_REQUIRE_RECAPTCHA=false\n' >> frontend/.env.local
          nohup bash -lc 'cd frontend && npm run dev -- --host 127.0.0.1 --strictPort' > /tmp/dullypdf-frontend.log 2>&1 &
          wait_for_http http://127.0.0.1:5173/ /tmp/dullypdf-frontend.log "Frontend dev server"

          export PLAYWRIGHT_BASE_URL="http://127.0.0.1:5173"
          export PLAYWRIGHT_API_URL="http://127.0.0.1:8000"
          export PLAYWRIGHT_MOCK_EXPENSIVE_AI="true"
          export PLAYWRIGHT_MOCK_EXPENSIVE_GPU="true"
          bash scripts/ci/run_targeted_playwright_suites.sh

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hybrid-qa-playwright-artifacts
          path: |
            output/playwright/**
            /tmp/dullypdf-frontend.log
            /tmp/dullypdf-backend.log
          if-no-files-found: ignore

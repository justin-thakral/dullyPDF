version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: pg-ai
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-healthdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-ai
    restart: unless-stopped
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
      MSSQL_PID: ${MSSQL_PID:-Express}
    volumes:
      - mssqldata:/var/opt/mssql
    healthcheck:
      # Check that port 1433 is accepting connections (no sqlcmd dependency)
      test: ["CMD-SHELL", "/bin/bash -c '>/dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
    driver: local
  mssqldata:
    driver: local

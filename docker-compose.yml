version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-ai
    restart: unless-stopped
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD must be set}
      MSSQL_PID: ${MSSQL_PID:-Express}
    volumes:
      - mssqldata:/var/opt/mssql
    healthcheck:
      # Check that port 1433 is accepting connections (no sqlcmd dependency)
      test: ["CMD-SHELL", "/bin/bash -c '>/dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mssqldata:
    driver: local
